function daysSince(d){if(!d)return null;return Math.max(0,Math.floor((Date.now()-new Date(d+"T12:00:00").getTime())/86400000));}

function getStatus(p){
  if(!p.lastWatered)return{label:"Not yet logged",color:"gray",urgency:0};
  const s=daysSince(p.lastWatered),u=p.frequency-s;
  if(u<0)return{label:`${Math.abs(u)}d overdue`,color:"red",urgency:3};

  if(u<=2)return{label:`Due in ${u}d`,color:"yellow",urgency:1};

}

function compressImage(dataUrl,maxW=600,quality=0.62){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxW/img.width);
      const c=document.createElement("canvas");
      c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL("image/jpeg",quality));
    };
    img.src=dataUrl;
  });
}

function dbToPlant(r){
  return{id:r.id,name:r.name,location:r.location||"",frequency:r.frequency||7,lastWatered:r.last_watered||null,photo:r.photo||null,photoHistory:r.photo_history||[],careLog:r.care_log||[]};
}
function plantToDb(p){
  return{id:p.id,name:p.name,location:p.location||"",frequency:p.frequency||7,last_watered:p.lastWatered||null,photo:p.photo||null,photo_history:p.photoHistory||[],care_log:p.careLog||[]};
}

async function sbFetchAll(){
  const{data,error}=await sb.from("plants").select("*").order("created_at");
  if(error)throw error;
  return(data||[]).map(dbToPlant);
}
async function sbUpsert(plant){
  const{error}=await sb.from("plants").upsert(plantToDb(plant));
  if(error)throw error;
}
async function sbDelete(id){
  const{error}=await sb.from("plants").delete().eq("id",id);
  if(error)throw error;
}
async function sbUpsertMany(plants){
  if(!plants.length)return;
  const{error}=await sb.from("plants").upsert(plants.map(plantToDb));
  if(error)throw error;
}

async function identifyPlant(b64,mtype,key){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:mtype,data:b64}},
      {type:"text",text:`Plant expert. Respond ONLY with valid JSON, no backticks, no markdown:
{"name":"Specific common name e.g. Watermelon Peperomia","frequency":<days between waterings indoors Southern California>,"initialNote":"3-4 sentences: light needs, watering style, fertilizer, one key watch-out.","confidence":"high"|"medium"|"low"}`}
    ]}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return JSON.parse(data.content.find(b=>b.type==="text").text.replace(/```json|```/g,"").trim());
}

    setPlants(p=>p.map(x=>{
      if(x.id!==id)return x;
      const hist=[...(x.photoHistory||[]),{url,timestamp:getNowStr()}];
      const updated={...x,photo:url,photoHistory:hist,careLog:[...(x.careLog||[]),{id:`ph${Date.now()}`,date:getNowStr(),text:"📷 Photo updated.",source:"manual"}]};
      sbUpsert(updated).then(showSaved).catch(showErr);
      return updated;
    }));
  };

  const saveEdit=plant=>{
    const isNew=!plant.id;
    const p={...plant,id:plant.id||Date.now().toString(),photoHistory:plant.photoHistory||[],careLog:plant.careLog||[]};
    if(isNew)setPlants(prev=>[...prev,p]);
    else setPlants(prev=>prev.map(x=>x.id===p.id?p:x));
    sbUpsert(p).then(showSaved).catch(showErr);
    setModal(null);
  };

  const remove=id=>{
    setPlants(p=>p.filter(x=>x.id!==id));
    sbDelete(id).then(showSaved).catch(showErr);
    setConfirmDel(null);
    if(detail?.id===id)setDetail(null);
  };

  const exportData=()=>{
    const blob=new Blob([JSON.stringify({version:2,exported:new Date().toISOString(),app:"Plawa",plants},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`plawa-backup-${new Date().toISOString().split("T")[0]}.json`;
    a.click();URL.revokeObjectURL(url);
  };

  const importRef=useRef();
  const importData=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const imported=data.plants||data;
        if(!Array.isArray(imported))throw new Error("Invalid format");
        await sbUpsertMany(imported);
        setPlants(imported);
        alert(`Imported ${imported.length} plants successfully!`);
      }catch(err){alert("Import failed: "+err.message);}
    };
    r.readAsText(f);
  };

  const attn=plants.filter(p=>getStatus(p).urgency>0);
  const shown=filter==="attention"?attn:filter==="good"?plants.filter(p=>!getStatus(p).urgency):plants;

  if(!loaded)return(
    <div style={{minHeight:"100vh",background:"#F6F1EA",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{width:64,height:64,borderRadius:"50%",background:"#1C3A20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>🌿</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#1C3A20",fontWeight:700}}>Plawa</div>
      <div style={{color:"#5A9A68",fontSize:14}}>{dbError?"Connection error...":"Loading your garden…"}</div>
      {dbError&&<div style={{color:"#EF4444",fontSize:13,maxWidth:280,textAlign:"center",padding:"0 20px"}}>{dbError}</div>}
    </div>
  );

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#F6F1EA",maxWidth:540,margin:"0 auto"}}>
      <div style={{
        background:"linear-gradient(150deg,#1C3A20 0%,#2C5A34 60%,#3D7A48 100%)",
        flexShrink:0,
        transform:headerHidden?"translateY(-100%)":"translateY(0)",
        transition:"transform 0.25s ease",
        padding:"max(env(safe-area-inset-top,0px),24px) 16px 12px",
      }}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🌿</div>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:20,fontWeight:700,letterSpacing:0.5}}>Plawa</div>
              <div style={{color:"#A8D5B5",fontSize:11,display:"flex",alignItems:"center",gap:6}}>
                {plants.length} plants
                {saveStatus==="saved"&&<span style={{color:"#86EFAC",fontSize:10,fontWeight:600}}>☁ saved</span>}
                {saveStatus==="error"&&<span style={{color:"#FCA5A5",fontSize:10,fontWeight:600}}>⚠ save error</span>}
              </div>
            </div>
          </div>
          <button onClick={()=>setShowSettings(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",width:34,height:34,borderRadius:"50%",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>⚙️</button>
        </div>
        {attn.length>0&&(
          <div style={{background:"rgba(255,255,255,0.12)",borderRadius:10,padding:"6px 10px",display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:14}}>💧</span>
            <div>
              <div style={{color:"#fff",fontSize:12,fontWeight:600}}>{attn.length} plant{attn.length>1?"s":""} need attention</div>
              <div style={{color:"#A8D5B5",fontSize:11,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:260}}>{attn.map(p=>p.name).join(" · ")}</div>
            </div>
          </div>
        )}
        <div style={{display:"flex",gap:10}}>
          {[["all",`All  ${plants.length}`],["attention",`⚠️  ${attn.length}`],["good","✅  Good"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} style={{
              padding:"6px 16px",borderRadius:999,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",
              background:filter===k?"rgba(255,255,255,0.95)":"rgba(255,255,255,0.15)",
              color:filter===k?"#1C3A20":"#fff",
              boxShadow:filter===k?"0 2px 6px rgba(0,0,0,0.2)":"none",
            }}>{l}</button>
          ))}
        </div>
      </div>

      <div id="scroll-area" style={{flex:1,overflowY:"auto",padding:"12px 12px 96px"}}
        onScroll={e=>{
          const y=e.target.scrollTop;
          setHeaderHidden(y>80&&y>lastScrollY.current);
          lastScrollY.current=y;
        }}>
        {shown.length===0&&(
          <div style={{textAlign:"center",paddingTop:80,color:"#A0ACA2"}}>
            <div style={{fontSize:48,marginBottom:8}}>🪴</div>
            <div style={{fontWeight:500,fontSize:15}}>No plants here</div>
            <div style={{fontSize:13,marginTop:4,color:"#B8C4B9"}}>Tap + to add your first plant</div>
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {shown.map(plant=>(
            <PlantCard key={plant.id} plant={plant}
              onTap={()=>setDetail(plant)}
              onWater={()=>water(plant.id)}
              onEdit={()=>setModal({mode:"edit",plant})}
              onDelete={()=>setConfirmDel(plant.id)}
              flashing={flash===plant.id}/>
          ))}
        </div>
      </div>

      <button onClick={()=>setModal({mode:"add"})} style={{
        position:"fixed",bottom:"max(24px,env(safe-area-inset-bottom,24px))",right:20,
        width:52,height:52,borderRadius:"50%",
        background:"linear-gradient(135deg,#1C3A20,#3D7A48)",color:"#fff",fontSize:24,border:"none",
        boxShadow:"0 4px 20px rgba(44,90,52,0.5)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:20,
      }}>+</button>

      {detail&&<DetailSheet plant={detail} flashing={flash===detail.id}
        onWater={()=>water(detail.id)} onAddNote={t=>addNote(detail.id,t)}
        onAddPhoto={u=>addPhoto(detail.id,u)}
        onEdit={()=>setModal({mode:"edit",plant:detail})}
        onDelete={()=>setConfirmDel(detail.id)} onClose={()=>setDetail(null)}/>}

      {modal&&<PlantModal mode={modal.mode} plant={modal.plant} apiKey={apiKey} onSave={saveEdit} onClose={()=>setModal(null)}/>}

      {showSettings&&<SettingsSheet apiKey={apiKey}
        onSave={k=>{localStorage.setItem(API_KEY_K,k);setApiKey(k);setShowSettings(false);}}
        onClose={()=>setShowSettings(false)}
        onExport={exportData}
        onImport={()=>importRef.current.click()}/>}
      <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={importData}/>

      {confirmDel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:80,padding:20}}>
          <div style={{background:"#fff",borderRadius:22,padding:24,maxWidth:290,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:36,marginBottom:10}}>🗑️</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:4,color:"#1A2C1C"}}>Remove plant?</div>
            <div style={{color:"#8A9B8C",fontSize:13,marginBottom:18}}>This cannot be undone.</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setConfirmDel(null)} style={{flex:1,padding:"11px 0",borderRadius:12,border:"1.5px solid #E0E8E1",background:"#fff",color:"#5C6B5E",fontWeight:600,cursor:"pointer"}}>Cancel</button>
              <button onClick={()=>remove(confirmDel)} style={{flex:1,padding:"11px 0",borderRadius:12,border:"none",background:"#EF4444",color:"#fff",fontWeight:600,cursor:"pointer"}}>Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PlantCard({plant,onTap,onWater,onEdit,onDelete,flashing}){
  const [menu,setMenu]=useState(false);
  const st=getStatus(plant);const th=TH[st.color];
  const since=daysSince(plant.lastWatered);
  const pct=plant.lastWatered?Math.min(100,Math.round((since/plant.frequency)*100)):0;
  return(
    <div onClick={onTap} style={{background:flashing?"#E8F5E9":th.card,border:`2px solid ${flashing?"#86EFAC":th.border}`,borderRadius:18,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",transition:"all 0.3s",cursor:"pointer"}}>
      <div style={{display:"flex",gap:10}}>
        <div style={{width:56,height:56,borderRadius:14,overflow:"hidden",background:"linear-gradient(135deg,#D4EDDA,#B8DCC0)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>
          {plant.photo?<img src={plant.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:pEmoji(plant.name)}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{minWidth:0}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,color:"#1A2C1C",fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{plant.name}</div>
              <div style={{color:"#8A9B8C",fontSize:11,marginTop:1}}>📍 {plant.location||"No location"}</div>
            </div>
            <div style={{position:"relative",flexShrink:0}}>
              <button onClick={e=>{e.stopPropagation();setMenu(!menu);}} style={{background:"none",border:"none",cursor:"pointer",color:"#A0ACA2",fontSize:20,padding:"0 4px",fontWeight:700}}>⋯</button>
              {menu&&(
                <div style={{position:"absolute",right:0,top:28,background:"#fff",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,0.15)",zIndex:20,overflow:"hidden",minWidth:120}}>
                  <button onClick={e=>{e.stopPropagation();onEdit();setMenu(false);}} style={{width:"100%",textAlign:"left",padding:"10px 14px",border:"none",background:"none",cursor:"pointer",fontSize:14,color:"#374151"}}>✏️ Edit</button>
                  <button onClick={e=>{e.stopPropagation();onDelete();setMenu(false);}} style={{width:"100%",textAlign:"left",padding:"10px 14px",border:"none",background:"none",cursor:"pointer",fontSize:14,color:"#EF4444"}}>🗑️ Remove</button>
                </div>
              )}
            </div>
          </div>
          <div style={{display:"inline-block",marginTop:5,padding:"2px 8px",borderRadius:999,background:th.badge,color:th.badgeText,fontSize:11,fontWeight:700}}>{st.label}</div>
          <div style={{marginTop:6,height:4,background:"rgba(0,0,0,0.07)",borderRadius:99,overflow:"hidden"}}>
            <div style={{width:`${pct}%`,height:"100%",background:th.bar,borderRadius:99}}/>
          </div>
          <div style={{color:"#9AA89C",fontSize:11,marginTop:4}}>
            {plant.lastWatered?`Watered ${since===0?"today":`${since}d ago`} · every ${plant.frequency}d`:`Every ${plant.frequency}d · not yet logged`}
          </div>
          {(plant.careLog?.length>0)&&<div style={{color:"#2C5A34",fontSize:11,marginTop:2,fontWeight:500}}>📋 {plant.careLog.length} notes · tap to view →</div>}
        </div>
      </div>
      <button onClick={e=>{e.stopPropagation();onWater();}} style={{marginTop:10,width:"100%",padding:"10px 0",borderRadius:12,background:flashing?"linear-gradient(135deg,#22C55E,#16A34A)":"linear-gradient(135deg,#3b82f6,#6366f1)",color:"#fff",border:"none",fontWeight:600,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6,transition:"all 0.2s"}}>
        {flashing?"✅ Watered!":"💧 Water Today"}
      </button>
    </div>
  );
}

function DetailSheet({plant,flashing,onWater,onAddNote,onAddPhoto,onEdit,onDelete,onClose}){
  const [tab,setTab]=useState("status");
  const [noteText,setNoteText]=useState("");
  const [viewPhoto,setViewPhoto]=useState(null);
  const photoRef=useRef();
  const st=getStatus(plant);const th=TH[st.color];
  const since=daysSince(plant.lastWatered);
  const pct=plant.lastWatered?Math.min(100,Math.round((since/plant.frequency)*100)):0;
  const nextWater=plant.lastWatered?(()=>{const d=new Date(plant.lastWatered+"T12:00:00");d.setDate(d.getDate()+plant.frequency);return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});})():"Not tracked";
  const sortedLog=[...(plant.careLog||[])].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sortedPhotos=[...(plant.photoHistory||[])].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:50}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",width:"100%",maxWidth:540,borderRadius:"22px 22px 0 0",maxHeight:"92vh",display:"flex",flexDirection:"column"}}>
        <div style={{height:plant.photo?180:90,background:plant.photo?"#111":"linear-gradient(135deg,#D4EDDA,#A8D5B5)",position:"relative",overflow:"hidden",borderRadius:"22px 22px 0 0",flexShrink:0}}>
          {plant.photo&&<img src={plant.photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover",opacity:0.85}}/>}
          {!plant.photo&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:52}}>{pEmoji(plant.name)}</div>}
          <div style={{position:"absolute",top:8,left:"50%",transform:"translateX(-50%)",width:32,height:4,background:"rgba(255,255,255,0.7)",borderRadius:99}}/>
          <button onClick={onClose} style={{position:"absolute",top:10,right:12,width:30,height:30,borderRadius:"50%",background:"rgba(0,0,0,0.4)",border:"none",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          <button onClick={()=>photoRef.current.click()} style={{position:"absolute",bottom:8,right:10,background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",fontSize:12,padding:"5px 10px",borderRadius:8,cursor:"pointer"}}>📷 {plant.photo?"Update":"Add"}</button>
          {sortedPhotos.length>1&&<button onClick={()=>setTab("photos")} style={{position:"absolute",bottom:8,left:10,background:"rgba(0,0,0,0.55)",border:"none",color:"#fff",fontSize:12,padding:"5px 10px",borderRadius:8,cursor:"pointer"}}>🗂️ {sortedPhotos.length} photos</button>}
          <input ref={photoRef} type="file" accept="image/*" capture="environment" style={{display:"none"}}
            onChange={async e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=async ev=>{const c=await compressImage(ev.target.result);onAddPhoto(c);};r.readAsDataURL(f);}}/>
        </div>

        <div style={{padding:"12px 16px 0",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{minWidth:0,flex:1,paddingRight:8}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#1A2C1C",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{plant.name}</div>
              <div style={{color:"#8A9B8C",fontSize:13}}>📍 {plant.location||"No location"}</div>
            </div>
            <div style={{display:"flex",gap:6,flexShrink:0}}>
              <button onClick={onEdit} style={{padding:"6px 10px",borderRadius:10,border:"1.5px solid #D8E8DA",background:"#fff",color:"#2C5A34",fontWeight:600,fontSize:12,cursor:"pointer"}}>✏️</button>
              <button onClick={onDelete} style={{padding:"6px 10px",borderRadius:10,border:"1.5px solid #FCA5A5",background:"#fff",color:"#EF4444",fontWeight:600,fontSize:12,cursor:"pointer"}}>🗑️</button>
            </div>
          </div>
          <div style={{display:"flex",gap:0,marginTop:10,background:"#F0F4F1",borderRadius:10,padding:3}}>
            {[["status","💧 Status"],["journal",`📋 Journal (${plant.careLog?.length||0})`],["photos",`📷 (${sortedPhotos.length})`]].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"7px 4px",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:tab===k?"#fff":"transparent",color:tab===k?"#1C3A20":"#7A8E7C",boxShadow:tab===k?"0 1px 4px rgba(0,0,0,0.1)":"none"}}>{l}</button>
            ))}
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"12px 16px 28px"}}>
          {tab==="status"&&(
            <>
              <div style={{display:"inline-block",padding:"4px 12px",borderRadius:999,background:th.badge,color:th.badgeText,fontSize:12,fontWeight:700,marginBottom:10}}>{st.label}</div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#9AA89C",marginBottom:4}}>
                <span>Last: {plant.lastWatered?fmtDate(plant.lastWatered+"T12:00:00"):"Not logged"}</span>
                <span>Next: {nextWater}</span>
              </div>
              <div style={{height:8,background:"#E5E7EB",borderRadius:99,overflow:"hidden",marginBottom:6}}>
                <div style={{width:`${pct}%`,height:"100%",background:th.bar,borderRadius:99}}/>
              </div>
              <div style={{color:"#9AA89C",fontSize:12,textAlign:"center",marginBottom:14}}>
                Every {plant.frequency} days · {plant.lastWatered?(since===0?"watered today":`${since} day${since!==1?"s":""} since last watered`):"tap Water Today to begin"}
              </div>
              {sortedLog.find(l=>!l.text.includes("💧")&&!l.text.includes("📷"))&&(
                <div style={{padding:12,background:"#F6FBF7",borderRadius:14,border:"1.5px solid #D4EDDA",marginBottom:14}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#5A9A68",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Latest care note</div>
                  <div style={{fontSize:13,color:"#3A4E3C",lineHeight:1.6}}>{sortedLog.find(l=>!l.text.includes("💧")&&!l.text.includes("📷"))?.text}</div>
                  <div style={{fontSize:11,color:"#A0ACA2",marginTop:4}}>→ Tap Journal for full history</div>
                </div>
              )}
              <button onClick={onWater} style={{width:"100%",padding:"14px 0",borderRadius:14,background:flashing?"linear-gradient(135deg,#22C55E,#16A34A)":"linear-gradient(135deg,#3b82f6,#6366f1)",color:"#fff",border:"none",fontWeight:700,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all 0.3s"}}>
                {flashing?"✅ Watered! 🌱":"💧 Water Today"}
              </button>
            </>
          )}
          {tab==="journal"&&(
            <>
              <div style={{marginBottom:14,background:"#F6FBF7",borderRadius:14,padding:12,border:"1.5px solid #D4EDDA"}}>
                <div style={{fontSize:11,fontWeight:700,color:"#5A9A68",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>Add Care Note</div>
                <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Observations, fertilizer applied, new growth, pests…" rows={3} style={{width:"100%",padding:"9px 11px",borderRadius:10,border:"1.5px solid #D8E8DA",background:"#fff",fontSize:13,color:"#1A2C1C",outline:"none",resize:"none",boxSizing:"border-box"}}/>
                <button onClick={()=>{if(noteText.trim()){onAddNote(noteText.trim());setNoteText("");}}} disabled={!noteText.trim()} style={{marginTop:8,width:"100%",padding:"9px 0",borderRadius:10,border:"none",background:noteText.trim()?"linear-gradient(135deg,#1C3A20,#3D7A48)":"#D1D5DB",color:"#fff",fontWeight:600,fontSize:14,cursor:noteText.trim()?"pointer":"default"}}>+ Add Note</button>
              </div>
              {sortedLog.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#A0ACA2"}}><div style={{fontSize:32}}>📋</div><div style={{marginTop:6}}>No notes yet</div></div>}
              {sortedLog.map((entry,i)=>(
                <div key={entry.id||i} style={{display:"flex",gap:10,marginBottom:14,position:"relative"}}>
                  {i<sortedLog.length-1&&<div style={{position:"absolute",left:13,top:28,width:2,height:"calc(100% + 4px)",background:"#E5E7EB"}}/>}
                  <div style={{width:26,height:26,borderRadius:"50%",background:entry.source==="claude"?"#EDE9FE":entry.text.includes("💧")?"#DBEAFE":entry.text.includes("📷")?"#FEF3C7":"#F0FDF4",border:`2px solid ${entry.source==="claude"?"#C4B5FD":entry.text.includes("💧")?"#93C5FD":entry.text.includes("📷")?"#FCD34D":"#86EFAC"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0,zIndex:1}}>
                    {entry.source==="claude"?"✨":entry.text.includes("💧")?"💧":entry.text.includes("📷")?"📷":"📝"}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,color:"#A0ACA2",marginBottom:2}}>{fmtDT(entry.date)}{entry.source==="claude"&&<span style={{color:"#7C3AED",fontWeight:600}}> · from Claude</span>}</div>
                    <div style={{fontSize:13,color:"#3A4E3C",lineHeight:1.6,background:"#FAFAF9",borderRadius:10,padding:"7px 10px",border:"1px solid #F0F0EE"}}>{entry.text}</div>
                  </div>
                </div>
              ))}
            </>
          )}
          {tab==="photos"&&(
            <>
              {sortedPhotos.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#A0ACA2"}}><div style={{fontSize:36}}>📷</div><div style={{marginTop:6}}>No photos yet</div><div style={{fontSize:13,marginTop:4}}>Tap "Add" above to start your growth timeline</div></div>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {sortedPhotos.map((p,i)=>(
                  <div key={i} onClick={()=>setViewPhoto(p)} style={{cursor:"pointer",position:"relative"}}>
                    <img src={p.url} alt="" style={{width:"100%",aspectRatio:"1",objectFit:"cover",borderRadius:12,display:"block"}}/>
                    <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.72))",borderRadius:"0 0 12px 12px",padding:"18px 8px 6px"}}>
                      <div style={{color:"#fff",fontSize:11,fontWeight:600,textAlign:"center"}}>{fmtDate(p.timestamp)}</div>
                      {i===0&&<div style={{color:"#86EFAC",fontSize:10,fontWeight:700,textAlign:"center",letterSpacing:0.5}}>LATEST</div>}
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
      {viewPhoto&&(
        <div style={{position:"fixed",inset:0,background:"#000",zIndex:90,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}} onClick={()=>setViewPhoto(null)}>
          <img src={viewPhoto.url} alt="" style={{maxWidth:"100%",maxHeight:"75vh",objectFit:"contain",borderRadius:8}}/>
          <div style={{marginTop:14,background:"rgba(255,255,255,0.1)",borderRadius:10,padding:"8px 20px",textAlign:"center"}}>
            <div style={{color:"#fff",fontSize:15,fontWeight:600}}>{fmtDate(viewPhoto.timestamp)}</div>
            <div style={{color:"#aaa",fontSize:12,marginTop:2}}>{new Date(viewPhoto.timestamp).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</div>
          </div>
          <div style={{color:"#666",fontSize:12,marginTop:10}}>Tap anywhere to close</div>
        </div>
      )}
    </div>
  );
}

function SettingsSheet({apiKey,onSave,onClose,onExport,onImport}){
  const [k,setK]=useState(apiKey);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:70}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",width:"100%",maxWidth:540,borderRadius:"22px 22px 0 0",padding:"20px 20px 44px",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{width:32,height:4,background:"#E0E8E1",borderRadius:99,margin:"0 auto 14px"}}/>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#1A2C1C",marginBottom:14}}>⚙️ Settings</div>

        <div style={{background:"#F0FDF4",border:"1.5px solid #86EFAC",borderRadius:14,padding:14,marginBottom:16}}>
          <div style={{fontSize:11,fontWeight:700,color:"#166534",textTransform:"uppercase",letterSpacing:0.8,marginBottom:6}}>☁️ Cloud Backup</div>
          <div style={{fontSize:13,color:"#3A4E3C",marginBottom:10,lineHeight:1.6}}>Your plants save to Supabase automatically. Export creates an extra local backup file. Import restores from that file.</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onExport} style={{flex:1,padding:"10px 0",borderRadius:12,border:"none",background:"linear-gradient(135deg,#1C3A20,#3D7A48)",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:13}}>⬇️ Export backup</button>
            <button onClick={onImport} style={{flex:1,padding:"10px 0",borderRadius:12,border:"1.5px solid #2C5A34",background:"#fff",color:"#2C5A34",fontWeight:600,cursor:"pointer",fontSize:13}}>⬆️ Import backup</button>
          </div>
        </div>

        <div style={{color:"#8A9B8C",fontSize:13,marginBottom:8,lineHeight:1.6}}>Anthropic API key for AI plant identification. Free at <strong>console.anthropic.com</strong> → API Keys.</div>
        <label style={{fontSize:11,fontWeight:600,color:"#7A8E7C",textTransform:"uppercase",letterSpacing:0.8,display:"block",marginBottom:4}}>API Key</label>
        <input value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-..." type="password" style={{width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #D8E8DA",background:"#FAFDF9",fontSize:14,outline:"none",marginBottom:14,boxSizing:"border-box"}}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"12px 0",borderRadius:12,border:"1.5px solid #D8E8DA",background:"#fff",color:"#5C6B5E",fontWeight:600,cursor:"pointer"}}>Cancel</button>
          <button onClick={()=>onSave(k)} style={{flex:1,padding:"12px 0",borderRadius:12,border:"none",background:"linear-gradient(135deg,#1C3A20,#3D7A48)",color:"#fff",fontWeight:600,cursor:"pointer"}}>Save</button>
        </div>
      </div>
    </div>
  );
}

function PlantModal({mode,plant,apiKey,onSave,onClose}){
  const [name,setName]=useState(plant?.name||"");
  const [location,setLocation]=useState(plant?.location||"");
  const [frequency,setFrequency]=useState(plant?.frequency||7);
  const [lastWatered,setLastWatered]=useState(plant?.lastWatered||"");
  const [photo,setPhoto]=useState(plant?.photo||null);
  const [identifying,setIdentifying]=useState(false);
  const [aiError,setAiError]=useState(null);
  const [aiDone,setAiDone]=useState(false);
  const [initialNote,setInitialNote]=useState("");
  const fileRef=useRef();

  const handleFile=async e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async ev=>{
      const compressed=await compressImage(ev.target.result);
      setPhoto(compressed);
      if(mode==="add"){
        if(!apiKey){setAiError("No API key — tap ⚙️ to add one.");return;}
        setIdentifying(true);setAiError(null);setAiDone(false);
        try{
          const res=await identifyPlant(ev.target.result.split(",")[1],f.type||"image/jpeg",apiKey);
          setName(toTitleCase(res.name||""));setFrequency(res.frequency||7);setInitialNote(res.initialNote||"");setAiDone(true);
        }catch(err){setAiError("Couldn't identify — fill in manually. ("+err.message+")");}
        finally{setIdentifying(false);}
      }
    };
    r.readAsDataURL(f);
  };

  const handleSave=()=>{
    const careLog=plant?.careLog?[...plant.careLog]:[];
    if(mode==="add"&&initialNote)careLog.push({id:`ai${Date.now()}`,date:getNowStr(),text:initialNote,source:"claude"});
    const photoHistory=plant?.photoHistory?[...plant.photoHistory]:[];
    if(mode==="add"&&photo)photoHistory.push({url:photo,timestamp:getNowStr()});
    onSave({id:plant?.id,name:toTitleCase(name),location,frequency,lastWatered:lastWatered||null,photo,photoHistory,careLog});
  };

  const inp={width:"100%",padding:"10px 12px",borderRadius:10,border:"1.5px solid #D8E8DA",background:"#FAFDF9",fontSize:15,color:"#1A2C1C",outline:"none",boxSizing:"border-box"};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:60}}>
      <div style={{background:"#fff",width:"100%",maxWidth:540,borderRadius:"22px 22px 0 0",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{padding:"16px 16px 40px"}}>
          <div style={{width:32,height:4,background:"#E0E8E1",borderRadius:99,margin:"0 auto 12px"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:"#1A2C1C"}}>{mode==="add"?"🌱 Add Plant":"✏️ Edit Plant"}</div>
            <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"#A0ACA2",cursor:"pointer"}}>✕</button>
          </div>

          {mode==="add"&&(
            <div style={{marginBottom:10,padding:"9px 12px",background:"#F0FDF4",border:"1.5px solid #86EFAC",borderRadius:12,fontSize:13,color:"#166534"}}>
              <strong>✨ AI-powered</strong> — photo → Claude identifies plant, watering schedule & care notes.{!apiKey&&<span style={{color:"#92400E"}}> <strong>No API key</strong> — tap ⚙️.</span>}
            </div>
          )}

          <button onClick={()=>fileRef.current.click()} style={{width:"100%",height:120,borderRadius:16,border:aiDone?"2px solid #86EFAC":"2px dashed #A8D5B5",background:photo?"transparent":"#F6FBF7",overflow:"hidden",cursor:"pointer",position:"relative",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",marginBottom:12}}>
            {photo&&<img src={photo} alt="" style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>}
            {identifying&&<div style={{position:"absolute",inset:0,background:"rgba(28,58,32,0.87)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6}}><div style={{fontSize:28}}>🔍</div><div style={{color:"#A8D5B5",fontSize:14,fontWeight:600}}>Identifying…</div></div>}
            {aiDone&&!identifying&&<div style={{position:"absolute",bottom:6,left:6,right:6,background:"rgba(28,58,32,0.88)",borderRadius:8,padding:"5px 10px"}}><span style={{color:"#A8D5B5",fontSize:12,fontWeight:600}}>✨ Identified — review below</span></div>}
            {!photo&&!identifying&&<><span style={{fontSize:28}}>📷</span><span style={{fontSize:13,color:"#5A9A68",marginTop:4}}>Take or upload a photo</span></>}
          </button>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFile}/>
          {aiError&&<div style={{marginBottom:10,padding:"8px 12px",background:"#FFF7ED",border:"1px solid #FDBA74",borderRadius:10,fontSize:13,color:"#92400E"}}>⚠️ {aiError}</div>}

          <div style={{display:"flex",flexDirection:"column",gap:11}}>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:"#7A8E7C",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Plant Name *</div>
              <input value={name} onChange={e=>setName(e.target.value)} onBlur={e=>setName(toTitleCase(e.target.value))} placeholder="e.g. Fiddle Leaf Fig" style={inp}/>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:"#7A8E7C",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Location</div>
              <input value={location} onChange={e=>setLocation(e.target.value)} placeholder="e.g. Kitchen Window, Back Patio" style={inp}/>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:"#7A8E7C",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Water Every — {frequency} days</div>
              <input type="range" min="1" max="30" value={frequency} onChange={e=>setFrequency(+e.target.value)} style={{width:"100%",accentColor:"#2C5A34"}}/>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#A0ACA2",marginTop:2}}><span>Daily</span><span>2 weeks</span><span>Monthly</span></div>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:"#7A8E7C",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Last Watered</div>
              <input type="date" value={lastWatered} onChange={e=>setLastWatered(e.target.value)} style={inp}/>
            </div>
            {mode==="add"&&(
              <div>
                <div style={{fontSize:11,fontWeight:600,color:"#7A8E7C",textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Initial Care Notes{aiDone?" · ✨ AI-generated":""}</div>
                <textarea value={initialNote} onChange={e=>setInitialNote(e.target.value)} rows={3} placeholder="Care tips, light needs, fertilizer…" style={{...inp,resize:"none"}}/>
              </div>
            )}
          </div>

          <div style={{display:"flex",gap:8,marginTop:16}}>
            <button onClick={onClose} style={{flex:1,padding:"13px 0",borderRadius:12,border:"1.5px solid #D8E8DA",background:"#fff",color:"#5C6B5E",fontWeight:600,cursor:"pointer"}}>Cancel</button>
            <button onClick={handleSave} disabled={!name.trim()||identifying} style={{flex:1,padding:"13px 0",borderRadius:12,border:"none",background:(name.trim()&&!identifying)?"linear-gradient(135deg,#1C3A20,#3D7A48)":"#D1D5DB",color:"#fff",fontWeight:600,cursor:(name.trim()&&!identifying)?"pointer":"default"}}>
              {identifying?"Identifying…":mode==="add"?"Add Plant":"Save"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
</body>
</html>
